include:
  - project: "waldur/waldur-pipelines"
    file: "/templates/utils/release-utils.yml"
  - project: "waldur/waldur-pipelines"
    file: "/templates/stages.yml"

cache:
  key:
    files:
      - uv.lock

.build_before_script: &build_before_script
  - echo "[+] Adding SSH keys to the home directory"
  - mkdir -p ~/.ssh
  - cat "$SSH_JENKINS_GITHUB_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
  - cat "$SSH_JENKINS_GITHUB_PUBLIC_KEY" | tr -d '\r' > ~/.ssh/id_rsa.pub
  - chmod 600 ~/.ssh/id_rsa
  - chmod 600 ~/.ssh/id_rsa.pub
  - ssh-keygen -lf ~/.ssh/id_rsa.pub
  - ssh-keyscan -H "github.com" >> ~/.ssh/known_hosts
  - git config --global user.name "$GITLAB_USER_NAME"
  - git config --global user.email "$GITLAB_USER_EMAIL"

.base_job:
  image: registry.hpc.ut.ee/mirror/library/python:3.13-bookworm
  stage: test
  interruptible: true
  variables:
    RELEASE_VERSION: ""
  rules:
    # Skip tests if said so
    - if: '$SKIP_TESTS == "true" || $SKIP_TESTS == "yes"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
    # If tagged release
    - if: '$CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/'
    # If event is related to a created merge request
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    # If triggered from waldur-docs pipeline
    - if: '$CI_PIPELINE_SOURCE == "pipeline"'
  needs: []
  before_script:
    - apt-get update
    - pip install uv
    - uv sync --frozen

Run linters:
  extends: .base_job
  needs: []
  rules:
    - if: '$CI_PIPELINE_SOURCE == "pipeline"'
      when: never
    - if: '$SKIP_TESTS == "true" || $SKIP_TESTS == "yes"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  before_script:
    - pip install uv
  script:
    - uvx prek run --all-files

Run unit tests:
  extends: .base_job
  needs: []
  rules:
    - if: '$CI_PIPELINE_SOURCE == "pipeline"'
      when: never
    - if: '$SKIP_TESTS == "true" || $SKIP_TESTS == "yes"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  before_script:
    - pip install uv
  script:
    - uv run pytest ansible_waldur_generator/tests/unit/ --junitxml=unit_report.xml --cov=ansible_waldur_generator --cov-report=xml --cov-report=term-missing
  artifacts:
    when: always
    reports:
      junit: unit_report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
  coverage: '/TOTAL.*\s+(\d+%)$/'

Fetch schema (pipeline):
  extends: .fetch-schema-pipeline
  variables:
    OPENAPI_SCHEMA_DEST: "inputs/waldur_api.yaml"

Fetch schema (independent):
  extends: .fetch-schema-independent
  variables:
    OPENAPI_SCHEMA_DEST: "inputs/waldur_api.yaml"

Generate Collection:
  extends: .base_job
  needs:
    - job: Fetch schema (pipeline)
      optional: true
    - job: Fetch schema (independent)
      optional: true
  script:
    - apt-get update && apt-get install -y git jq
    - pip install yq
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        RELEASE_VERSION="$CI_COMMIT_TAG"
        echo "Building stable release version: $RELEASE_VERSION"
      elif [ -n "$RELEASE_VERSION" ]; then
        RELEASE_VERSION="$RELEASE_VERSION"
        echo "Building stable release version from docs trigger: $RELEASE_VERSION"
      else
        API_VERSION=$(yq -r '.info.version // empty' inputs/waldur_api.yaml 2>/dev/null || echo "0.0.0")
        if [ "$API_VERSION" = "0.0.0" ]; then
          git fetch --tags || true
          API_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
        fi
        TIMESTAMP=$(date +%Y%m%d%H%M%S)
        case "$API_VERSION" in
          *-*) RELEASE_VERSION="${API_VERSION}.dev.${TIMESTAMP}" ;;
          *)   RELEASE_VERSION="${API_VERSION}-dev.${TIMESTAMP}" ;;
        esac
        echo "Base API version resolved: $API_VERSION"
        echo "Building development release version: $RELEASE_VERSION"
      fi

      echo "Updating inputs/generator_config.yaml to version $RELEASE_VERSION"
      yq -iy '.collections[].version = "'$RELEASE_VERSION'"' inputs/generator_config.yaml

      echo "--- Updated inputs/generator_config.yaml ---"
      cat inputs/generator_config.yaml
      echo "-------------------------------------------"

      uv run ansible-waldur-generator --config inputs/generator_config.yaml --api-spec inputs/waldur_api.yaml --output-dir outputs/
  artifacts:
    paths:
      - outputs/

Test Collection 3.13:
  extends: .base_job
  needs: ["Generate Collection"]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "pipeline"'
      when: never
    - if: '$SKIP_TESTS == "true" || $SKIP_TESTS == "yes"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - uv run pytest ansible_waldur_generator/tests/e2e/ --junitxml=e2e_report.xml --vcr-record=none
  artifacts:
    when: always
    reports:
      junit: e2e_report.xml

